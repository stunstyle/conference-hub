{#include base activePage="login" title="Login - JPrime 2026"}
    {#body}
        <div style="max-width: 400px; margin: 40px auto; padding: 20px;">
            <div class="text-center" style="margin-bottom: 30px;">
                <h1 style="font-size: 2rem; font-weight: 800; margin-bottom: 8px;">Claim Ticket</h1>
                <p style="color: var(--text-secondary); font-size: 0.9rem;">Enter the details from your registration email to unlock your personal schedule and networking.</p>
            </div>

            <div class="card" style="padding: 30px 25px;">
                {#if error}
                    <div style="background: rgba(255, 60, 100, 0.1); border: 1px solid rgba(255, 60, 100, 0.3); color: var(--neon-pink); padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85rem; text-align: center;">
                        <i class="fa-solid fa-circle-exclamation"></i> {error}
                    </div>
                {/if}

                <form action="/login" method="POST">
                    <div style="margin-bottom: 20px;">
                        <label for="email" style="display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="e.g. name@company.com" 
                               style="width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: var(--text-primary); font-size: 1rem; outline: none; transition: border-color 0.3s ease;">
                    </div>

                    <div style="margin-bottom: 30px;">
                        <label for="ticketCode" style="display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Ticket / QR Code ID</label>
                        <input type="text" id="ticketCode" name="ticketCode" required placeholder="e.g. JP26-XXXX" 
                               style="width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: var(--text-primary); font-size: 1rem; outline: none; transition: border-color 0.3s ease;">
                    </div>

                    <button type="submit" class="btn" style="width: 100%; padding: 14px; font-size: 1rem; background: var(--primary-grad); border-radius: 8px;">
                        <i class="fa-solid fa-right-to-bracket" style="margin-right: 8px;"></i> Access App
                    </button>
                </form>
            </div>
            
            <div style="text-align: center; margin-top: 20px; font-size: 0.8rem; color: var(--text-secondary);">
                Having trouble? <a href="#" style="color: var(--neon-blue); text-decoration: none;">Contact Registration Desk</a>
            </div>
        </div>

        <style>
            input:focus {
                border-color: var(--neon-blue) !important;
                box-shadow: 0 0 0 2px rgba(0, 242, 254, 0.2);
            }
        </style>
    {/body}
{/include}
