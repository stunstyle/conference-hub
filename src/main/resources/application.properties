# H2 Database Configuration (using a local file so data persists during dev hot-reloads)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:./db/jprime;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.devservices=false

# Test profile H2 database configuration (in-memory to avoid locks with active dev server)
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:jprime_test;DB_CLOSE_DELAY=-1

# Hibernate ORM
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# Qute Configuration
quarkus.qute.suffixes=html

# External jPrime API Rest Client URL
quarkus.rest-client."io.jprime.service.JPrimeClient".url=https://jprime.io

# Allow multipart files for sponsor logo uploads (limit to 10MB)
quarkus.http.limits.max-body-size=10M

# Log formatting
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
